<!-- @dsCard group="Type" viewport="700x210" name="Accent & Labels" subtitle="Plus Jakarta Sans — the polished result, for UI chrome & kickers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--background-dark); padding: 24px; display:flex; flex-direction:column; gap: 18px; }
  .kicker { font-family: var(--font-accent); font-size: 12px; font-weight:700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-primary); }
  .acc-body { font-family: var(--font-accent); font-size: 15px; font-weight: 400; color: var(--text-secondary); line-height: 1.6; max-width: 56ch; }
  .micro { font-family: var(--font-accent); font-size: 11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color: var(--text-tertiary); }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-light); }
</style>
</head>
<body>
  <div class="kicker">Services · Footer headings · Nav</div>
  <div class="acc-body">Plus Jakarta Sans handles the agency's calmer voice — footer columns, form labels, and supporting body where the typewriter texture would be too loud.</div>
  <div class="micro">Location — Willemstad, Curaçao</div>
  <div class="note">var(--font-accent) · weights 200–800</div>
</body>
</html>
