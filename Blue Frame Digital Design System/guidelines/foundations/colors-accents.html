<!-- @dsCard group="Colors" viewport="700x190" name="Warm Signal Accents" subtitle="Coral, gold, terracotta & sage — sparing pops against the navy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--background-dark); padding: 24px; }
  .row { display: flex; gap: 14px; }
  .item { flex:1; }
  .chip { height: 80px; border-radius: var(--radius-md); box-shadow: var(--shadow-card); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 10px; }
  .hex { font-family: var(--font-accent); font-size: 10.5px; color: var(--text-light); letter-spacing:.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="chip" style="background:#f97316"></div><div class="name">accent-coral</div><div class="hex">#F97316</div></div>
    <div class="item"><div class="chip" style="background:#fbbf24"></div><div class="name">accent-gold</div><div class="hex">#FBBF24</div></div>
    <div class="item"><div class="chip" style="background:#d4745e"></div><div class="name">accent-terracotta</div><div class="hex">#D4745E</div></div>
    <div class="item"><div class="chip" style="background:#8b9a7f"></div><div class="name">accent-sage</div><div class="hex">#8B9A7F</div></div>
  </div>
</body>
</html>
