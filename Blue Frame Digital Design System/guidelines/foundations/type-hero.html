<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--background-dark); padding: 28px 24px; }
  .eyebrow { font-family: var(--font-mono); font-size: 14px; letter-spacing: .12em; color: var(--primary-teal-bright); margin-bottom: 10px; }
  .hero { font-family: var(--font-heading); font-weight: 700; font-size: 64px; line-height: 1.05; letter-spacing: 2px; color: var(--primary-teal-bright); text-shadow: 0 0 20px rgba(96,165,250,.35); margin: 0; }
  .hero span { color: var(--primary-teal-pale); }
  .note { font-family: var(--font-accent); font-size: 11px; color: var(--text-light); margin-top: 14px; letter-spacing:.03em; }
</style>
</head>
<body>
  <div class="eyebrow">// Blue Wave Based</div>
  <h1 class="hero">Blue<span>Frame</span><br>Digital.</h1>
  <div class="note">font-size-hero · clamp(4rem, 5vw, 7.2rem) · text-shadow glow on brand display</div>
</body>
</html>
