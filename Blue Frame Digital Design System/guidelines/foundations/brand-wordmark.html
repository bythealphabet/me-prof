<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--background-dark); padding: 28px 24px; display:flex; flex-direction:column; gap: 22px; }
  .wm { font-family: var(--font-heading); font-weight: 700; letter-spacing: .04em; }
  .lg { font-size: 38px; color: var(--primary-teal-bright); text-shadow: 0 0 20px rgba(96,165,250,.35); }
  .lg span { color: var(--primary-teal-pale); }
  .sm { font-size: 20px; color: var(--primary-teal-bright); }
  .sm span { color: var(--primary-teal-pale); }
  .note { font-family: var(--font-accent); font-size: 11px; color: var(--text-light); letter-spacing:.03em; }
</style>
</head>
<body>
  <div class="wm lg">Blue<span>Frame</span> Digital.</div>
  <div class="wm sm">Blue<span>Frame</span> Digital</div>
  <div class="note">"Frame" steps to the paler tint · trailing period optional on the hero lockup</div>
</body>
</html>
