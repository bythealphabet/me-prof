<!-- @dsCard group="Colors" viewport="700x190" name="Brand Navy Ramp" subtitle="The structural blue — CTAs, headers, brand moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--background-dark); padding: 24px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-card); }
  .sw { flex: 1; height: 96px; display: flex; align-items: flex-end; padding: 10px; }
  .meta { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
  .chip { font-family: var(--font-mono); font-size: 11px; }
  .legend { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; }
  .legend span { font-family: var(--font-accent); font-size: 10.5px; color: var(--text-light); text-align: center; letter-spacing: .04em; }
  .legend b { display:block; color: var(--text-tertiary); font-weight:600; font-size:11px; margin-bottom:2px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#00236f"></div>
    <div class="sw" style="background:#1e3a8a"></div>
    <div class="sw" style="background:#1e40af"></div>
    <div class="sw" style="background:#2563eb"></div>
    <div class="sw" style="background:#60a5fa"></div>
    <div class="sw" style="background:#93c5fd"></div>
  </div>
  <div class="legend" style="margin-top:12px">
    <span><b>#00236F</b>gradient-ink</span>
    <span><b>#1E3A8A</b>primary-blue</span>
    <span><b>#1E40AF</b>blue-dark</span>
    <span><b>#2563EB</b>blue-light</span>
    <span><b>#60A5FA</b>blue-bright</span>
    <span><b>#93C5FD</b>blue-pale</span>
  </div>
</body>
</html>
