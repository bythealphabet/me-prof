<!-- @dsCard group="Type" viewport="700x280" name="Heading Scale" subtitle="H1–H3 + body, all monospace (the blueprint draft)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--background-dark); padding: 24px; }
  .line { display:flex; align-items:baseline; gap: 16px; margin-bottom: 14px; }
  .tag { font-family: var(--font-accent); font-size: 10px; color: var(--text-light); width: 130px; flex:none; letter-spacing:.04em; }
  h2,h3 { margin:0; color: var(--text-primary); }
  .h1 { font-family: var(--font-heading); font-weight:700; font-size: 42px; color: var(--text-primary); }
  .bd { font-family: var(--font-body); font-size: 17px; color: var(--text-tertiary); line-height: 1.6; }
</style>
</head>
<body>
  <div class="line"><span class="tag">H1 · clamp 3.2–4.8rem</span><div class="h1">Websites that work</div></div>
  <div class="line"><span class="tag">H2 · clamp 2.8–4rem</span><h2>What We Do</h2></div>
  <div class="line"><span class="tag">H3 · clamp 2.4–3.2rem</span><h3>Professional Websites</h3></div>
  <div class="line"><span class="tag">body · clamp 1.6–1.8rem</span><div class="bd">Your Curaçao business deserves a site that actually works.</div></div>
</body>
</html>
