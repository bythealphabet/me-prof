<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { background: var(--background-dark); padding: 24px; --card-size-h: 26rem; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: stretch; }
  .row .bfd-card { min-height: 26rem; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, ServiceCard } = window.BlueFrameDigitalDesignSystem_91c13d;
  function Icon({ name }) {
    const ref = React.useRef(null);
    React.useEffect(() => { if (window.lucide && ref.current) window.lucide.createIcons({ nameAttr: 'data-lucide', icons: window.lucide.icons, attrs: { width: 24, height: 24 } }); }, []);
    return <i ref={ref} data-lucide={name}></i>;
  }
  function Demo() {
    return (
      <div className="row">
        <Card padding="lg" hover>
          <h3 style={{fontSize:'2rem', color:'var(--text-secondary)', margin:'0 0 1rem'}}>Built to last</h3>
          <p style={{margin:0, fontSize:'1.5rem'}}>Intentional engineering — fast loads, strong Core Web Vitals, no plugin sprawl.</p>
        </Card>
        <ServiceCard icon={<Icon name="globe" />} title="Professional Websites"
          description="A professional online presence that builds trust and turns visitors into clients." href="#" />
        <ServiceCard icon={<Icon name="sparkles" />} title="AI Business Assistant"
          description="Custom AI agents trained on how you work — smarter quoting and website chat." href="#" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
