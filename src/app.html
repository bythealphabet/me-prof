<!doctype html>
<html lang="en" data-palette="blue" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta
			name="description"
			content="Isaac Lucas — Front-end Developer based in Curaçao. Building beautiful, functional web applications."
		/>
		<script>
			(function () {
				try {
					var p = localStorage.getItem('bfd-palette');
					var t = localStorage.getItem('bfd-theme');
					if (p) document.documentElement.dataset.palette = p;
					if (t) document.documentElement.dataset.theme = t;
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
